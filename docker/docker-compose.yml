name: proton-drive-sync

services:
  proton-drive-sync:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: proton-drive-sync:local
    container_name: proton-drive-sync
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    pids_limit: 512
    environment:
      KEYRING_PASSWORD: ${KEYRING_PASSWORD}
      TZ: ${TZ:-UTC}
    ports:
      - "${DASHBOARD_PORT:-4242}:4242"
    volumes:
      - ./data/config:/config/proton-drive-sync
      - ./data/state:/state/proton-drive-sync
      - ${SYNC_DIR_KOPIA:-./data/kopia-repository}:/data/kopia-repository
    stop_grace_period: 30s
